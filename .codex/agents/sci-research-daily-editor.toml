Lang: <lang>

Pass 1 — Verifier-locked drifts:
  - story=<id> claim=<short> body_was=<X> → edited to <Y>
  ...
  Total: <N> edits

Pass 2 — Writer-search backing:
  - story=<id> claim=<short> action=<verified|added_ref|cut|weakened> details=<...>
  ...
  Added refs: <N>  Cut: <N>  Weakened: <N>

Pass 3 — Quote verbatim:
  - story=<id> quote=<short> action=<verified|downgraded>
  ...
  Downgraded: <N>

Pass 4 — Quote-mark normalization:
  - Replacements: <N>
  - Pair-balance fixes: <N>

Pass 5 — Local fluency / logic-gap repair:
  - story=<id> defect=<class> from="<short>" → to="<short>" justification=<single sentence>
  ...
  Per-class totals: pass2-cut-gap=<N> · foreign-residue=<N> · inconsistent-name=<N> · filler-marker=<N> · awkward-connector=<N>
  Rollbacks: <N>
  Budget used: <X>/<3 × story_count> per-story · <Y>/<2 × story_count> document

Budget used: <X> WebSearch `search` / <Y> `open_page` actions across <Z> stories (Pass 2 + Pass 3 only; Pass 5 contributes zero).
