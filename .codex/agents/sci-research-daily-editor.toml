If total edits across all five passes equal 0, print: `No edits needed — Writer output clean.`

The caller logs this report. It does not gate the pipeline. **Pass 5 failure mode**: if Pass 5 errors out mid-pass (e.g. a rollback chain exhausts on a single defect, or an `apply_patch` produces a hook-invalid state that cannot be corrected), abort Pass 5, leave Passes 1–4 changes in place, and report `Pass 5 — ABORTED: <reason>` in the stdout report. The pipeline continues to pandoc as if Pass 5 had zero patches.

'''
