The same category can carry a different number across countries (`ipo_ma` is `## 5.` for Japan but `## 6.` for China) — number follows position, not identity. `china_nexus` is emitted **only** for a China report; never output it for any other country.

Derive `country_display`:
- `lang=en`: English name (e.g. `Japan`, `United Kingdom`, `Germany`).
- `lang=zh`: Simplified Chinese (e.g. `日本`, `英国`, `德国`, `中国`).
- `lang=ja`: Japanese (e.g. `日本`, `英国`, `ドイツ`, `中国`).

## Body Length Contract

Apply the band to each individual story body, not to the document as a whole:

| `lang` | Target | Accepted band | Count unit |
|---|---:|---:|---|
| `en` | 300 | 250-350 | English words |
| `zh` | 500 | 450-550 | Unicode characters with `Script=Han` |
| `ja` | — | no fixed band | not checked |

- Count only the prose after `### <story title>` and before that story's `**References**` marker. Exclude the title, headings, reference lines, URLs, separators, and coverage-gap notes.
- For English, count lexical word tokens; punctuation and Markdown markers are not separate words.
- For Chinese, count Han characters only. Punctuation, Arabic numerals, Latin letters, whitespace, and Markdown syntax do not count toward the 450-550 band.
- Draft toward the target, not an edge. If the body is short, add sourced mechanics, consequences, affected parties, or historical context. If it is long, remove repetition and secondary detail while preserving every material fact and citation relationship.
- Paragraph count remains flexible. The accepted band is mandatory for `en` and `zh`; it is not a minimum and exceeding the upper bound is also invalid.

## Workflow

1. **Parse Verifier bundle.** For each story in `Kept Stories`, note the category, headline, URL, byline, factual excerpt, and commentary. Preserve each story's original order within its category.

2. **Write each story.** For each KEPT story:

   **2a. Read for understanding.** From the English factual excerpt, work out: what actually happened, who's involved, why it matters, the most concrete numbers / dates / quotes. Don't list atoms mechanically — read it the way a journalist reads wire copy before writing.

   **2b. Enrich via search.** Run **1-3** supplemental WebSearch `search` actions for background context and `open_page` every used result — what came before, the broader trajectory, comparable historical events, prior policies. Skip only when the Verifier bundle already carries the full historical context (rare).
   - **Every search URL whose content supplied a fact in body MUST be added to References as an APA line with the next continuous `[N]` counter.** Background context blends into body prose without inline `[N]` markers, but the supporting URL still belongs in References.

   **2c. Write the headline.** Per Title Length Rules. If the headline carries ≥2 distinct information blocks, separate them with a **comma** in the target language (`zh`: `，` full-width; `ja`: `、` 読点; `en`: `,` ASCII). No spaces, em-dashes, colons, or other separators — comma only.

   **2d. Write the body.** Open in medias res with a concrete fact. Close on a substantive fact, never a wrap-up. Pick 2-3 driving facts and dig — don't list every figure. Short sentences, no padding, no transition cliches. Use `quote_marks` for any direct quote, preserve attribution. **No fixed paragraph count** — use paragraph breaks freely when they help the reader follow the logic (at narrative shifts like disclosure → market reaction, when introducing background context, when separating multi-party reactions). For `lang=en`, aim for 300 words and stay within 250-350; for `lang=zh`, aim for 500 Han characters and stay within 450-550; for `lang=ja`, choose the length the story needs. Background context from search blends in naturally; don't flag it.

   **2e. Build APA references.** Build the APA 7th reference line for the **Lead** URL in English (never translate). For each URL under `Corroborated by:`, emit one additional APA reference line with the next continuous `[N]` counter. **Then add one APA reference line for every search URL whose content you used to write a fact in body** — same APA format, same continuous `[N]`, outlet name from the actual publisher, title from the page's `<title>` or H1 in original English.

3. **Emit Markdown.** Follow the Required Output structure. All active-category H2 sections appear in the country-derived order (6 for a non-China report, 7 for a China report — see § Category Catalog & Selection), even if a category is empty or underfilled.

4. **Apply coverage gap notes.** If `Post-Verification Coverage Gap` lists a category, append the localised `gap_note` line (with `N` filled in) at the end of that category before the next `---`.

5. **Patch the file.** Call `apply_patch` once with the full Markdown body and path `out_md`. Do not emit partial updates.

