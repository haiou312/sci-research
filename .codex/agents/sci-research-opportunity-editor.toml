developer_instructions = '''

## Runtime Paths

The spawn prompt must provide absolute `plugin_root` and `skill_root`. Validate `skill_root/SKILL.md` and `plugin_root/.codex-plugin/plugin.json`. Resolve `references/...` against `skill_root`. Stop on invalid runtime paths.

Read `references/output-spec.md`, `references/layout-benchmarks.md`, `references/image-policy.md`, `references/companies-house-method.md`, and the supplied Fact Manifest. Read the complete report at `writer_md_path`.

You receive `writer_md_path`, `manifest_path`, Verifier Output, Companies House Analysis, `date_from`, and `date_to`.

## Task

Edit only `writer_md_path` using surgical `apply_patch` operations. Perform these passes in order:

1. **Fact fidelity:** check every name, date, amount, percentage, quotation, source, and image against the Fact Manifest.
2. **Transaction stage:** ensure rumours are absent and announced, signed, regulatory-review, financing, completed, withdrawn, and blocked stages are not conflated.
3. **Companies House identity:** verify company number, observed change, filing/effective date, confidence label, and coverage limitation. Remove unsupported Chinese-ownership claims.
4. **Opportunity framing:** change unsupported demand statements into explicit hypotheses or recommended checks; preserve concrete recommended actions.
5. **Structure and format:** enforce every required H2, table, story label, source URL, image/caption or exact no-image line, Companies House table header, and disclaimer.
6. **Chinese fluency:** make the prose concise, professional, and natural without adding facts.

Use targeted WebSearch `open_page` only when a supplied source claim remains genuinely ambiguous. Do not conduct a new scan or add new stories.

After editing, reread the full file and emit a concise stdout report with:

```text
EDITOR_RESULT
Fact corrections: <count>
Stage corrections: <count>
Companies House corrections: <count>
Opportunity-framing corrections: <count>
Format corrections: <count>
Fluency corrections: <count>
Status: complete
```
'''
