### Step 1.5 — Search Query Fallback Rule

`site:`-anchored queries fail silently against many large publisher domains: Reuters, FT, WSJ, BBC, NYT, Bloomberg, Telegraph, Times, FAZ — their content is often deindexed or rate-limited, and `site:reuters.com {country} {date}` style queries return zero results even when the outlet has clearly published the story.

**For every non-T4 query (T1-wire, T1-flagship, T2, T3)**, follow this two-step procedure:

1. **Primary**: run `site:{domain} {country_en} {term} {date_en}` — **one query per term** in the current category's search-term set (Step 1), never `OR`-joined.
2. **Fallback** (run only when *that term's* primary query returns 0 results): rerun **the same single term** without the `site:` prefix:
   ```
   {outlet-name} {country_en} {term} {date_en}
   ```
   For example: `Reuters Japan "central bank" May 12 2026` (one term — not an `OR` chain).

**Domain filter on fallback results** (mandatory):
- From the fallback search results, **only keep URLs whose domain matches the original `{domain}`** (e.g. for the Reuters fallback, only keep `reuters.com` URLs).
- Discard aggregator URLs that wrap the original outlet's content: `yahoo.com`, `news.yahoo.com`, `finance.yahoo.com`, `msn.com`, `investing.com`, `marketscreener.com`, `seeking alpha.com`, `nasdaq.com` (article republish), Google News URLs, Apple News URLs, social media reposts.
- The intent is to recover canonical articles when `site:` indexing fails — not to admit aggregator-wrapped content.

**If the fallback also returns zero domain-matching URLs**, the outlet is exhausted for this category — move to the next outlet in the tier.

This fallback is a workaround for search-engine indexing limits, not a license to bypass tier authority. The Verifier still validates each candidate by tier (T1-wire, T1-flagship, etc.) based on the URL's domain.

### Conditional Categories — Search Mechanics

These rules apply **only when processing the `ipo_ma` or `china_nexus` category**. Skip this section when processing any of the other five. Eligibility / exclusion / routing rules are authoritative in `references/rubric.md` § Conditional & Topical Categories — the rules below are **search mechanics only**.

**`ipo_ma`** (present in every report; country-anchored):

- Search exactly like `econ` / `politics`: `site:{domain} {country_en} {term} {date_en}`, **one query per `ipo_ma` term** (Step 1), walking the same tier ladder with the same Step 1.5 fallback.
- **Primary-filing queries — ALWAYS RUN FIRST, before any tier and regardless of `min_per_category`.** This is `ipo_ma`'s real discovery channel: deals are filed with regulators/exchanges before any wire writes them up, the filing is free + same-day + highest authority, and it surfaces deals no headline sweep would. Query the report country's disclosure portal directly, **one query per form** (never `OR`-joined): for the US `site:sec.gov S-1 {date_en}`, `site:sec.gov 8-K {date_en}`, `site:sec.gov 424B {date_en}`, `site:sec.gov 425 {date_en}`, `site:sec.gov "SC TO" {date_en}`, `site:sec.gov EDGAR {country_en} IPO {date_en}`; for other countries the equivalent portal (LSE RNS, TSE, HKEX, Euronext, SGX, etc.). A date-verified S-1 / 8-K / 425 / prospectus is a T4-official Lead.
- T3 **Finance** + **Trade / Legal** sector rows (Finextra, The Paypers, Risk.net, GlobalCapital, MLex, Law360, S&P Global) are **always first-class** inside `ipo_ma` — run them right after the primary-filing queries, **regardless of `min_per_category`** (do NOT wait for T1-flagship to be exhausted). They are this category's habitat, not a fallback.
- **Three-band materiality routing** (per `references/rubric.md` § Conditional & Topical Categories § `ipo_ma`):
   - **Primary band** (IPO ≥ USD 300M, M&A ≥ USD 500M, or under security/antitrust review, or touching a China key industry): emit to the **main story list**, normal Verifier evaluation.
   - **Soft band** (USD 50M ≤ value < primary floor, no primary-band qualifier): emit to `## Reserve Pool` with `Held: below-ipo-ma-floor`. Fallback-1.5-eligible only — do NOT discard.
   - **Below USD 50M** (no primary-band qualifier): drop on the spot — the Verifier issues `Below-IPO-MA-threshold` if it ever surfaces; do not waste budget carrying it.

**`china_nexus`** (China report only; **NOT** country-anchored — region-unbounded global topical sweep):

- The foreign counterparty can be any country. Each query carries **no** `{country_en}` and **no** Region/Country matrix-row anchoring — **one query per `china_nexus` term** (Step 1):
  ```
  site:{domain} {term} {date_en}
  ```
- **External-T4 + global-wire topical sweep — ALWAYS RUN FIRST, before descending tiers and regardless of `min_per_category`.** This is `china_nexus`'s real discovery channel (its stories live in institutional releases and wires, not in any single country's headlines). At T4-official query the **China external-T4 table** (IMF / World Bank / WTO / OECD / BIS / IEA / US Treasury / USTR / US State Dept / US Commerce-BIS / White House / EU Commission / UK Gov / METI / MOFA Japan) — their releases on Chinese trade / investment / sanctions are prime `china_nexus` leads. Then, per term, all **T1-wire Universal** + all **T1-flagship Global** + **T3 Finance & Trade/Legal sector** rows. Do **not** use Country:/Region: rows (a global sweep has no single country-of-coverage). Chinese government domains are never queried (already the rule for a China report).
- Apply the rubric's cross-border test (China + ≥1 foreign party; a purely domestic China item belongs in `econ`/`politics`, never here), the Africa / small-developing-economy aid exclusion, the key-industry carve-out that overrides that exclusion, and key-industry priority when over `min_per_category`. You may pre-skip an obviously excluded item to conserve the ladder; the Verifier issues the authoritative DROP `China-aid-smallcountry-excluded` and the `china_nexus`↔`ipo_ma` routing tie-break.
- Step 1.5 fallback, Step 3 date gate, and Step 3.5 paywall fallback all apply unchanged.

### Pass B — Free Discovery

Pass B runs **after Pass A**, scoped to the current category in the loop. It is a bare-keyword sweep that admits legitimate non-matrix outlets — closing the recall gap from paywalls, wire-relay lag, and whitelist rigidity.

**When Pass B runs:**

- **Always** when processing `ipo_ma` or `china_nexus` (the two categories most constrained by the whitelist).
- **On demand** for the other five categories — only if, after Pass A, the category is below `min_per_category` OR a Pass-A Lead is a hard-paywall hit (Pass B may surface a free alternative covering the same event; if it does, promote the free outlet to Lead per Step 3.5, otherwise the hard-paywall Lead persists under `Body-source: paywall-stub`).

**Pass B query form:** bare keyword, **no `site:`**, no Region/Country matrix anchoring:

```
{country_en if country-anchored} {term} {date_en}
```

Run **one bare-keyword query per term** in the current category's search-term set (Step 1) — never `OR`-joined. `china_nexus` carries no `{country_en}`. For `ipo_ma`, also run the primary-filing queries from § Conditional Categories.

**Pass B per-hit pipeline (every hit, in order):**

1. **China red-line denylist (hard, runs FIRST, before anything else)**: for a China report, immediately discard any hit whose domain is a Chinese domestic-media outlet (Xinhua, Caixin, SCMP, People's Daily, Global Times, China Daily, Yicai, CGTN, TechNode, The Paper/澎湃, etc.) or a Chinese government domain (`*.gov.cn`, `pbc.gov.cn`, `mof.gov.cn`, `stats.gov.cn`, `csrc.gov.cn`, `mofcom.gov.cn`, etc.). This denylist is a rule, not a judgement call — it preserves the China external-view design even under free search.
2. **Date gate**: same Step 3 rule — publication date must exactly equal `date`. This is the cheapest filter; it kills most free-search long-tail junk before any further work.
3. **Source Legitimacy rubric**: classify the outlet per `references/rubric.md` § Source Legitimacy — `auto-accept` (recognized wire/flagship not yet in the matrix; or a free full-text syndication of a hard-paywalled wire/flagship original — record the paywalled original under `Corroborated by`), `conditional-accept` (independent newsroom + bylined reporter + original-or-attributed-syndication + corrections/track record + outlet's own domain), or `hard-reject` (PR-wire/press-release as primary, SEO/AI content farm, unbacked blog/Substack/Medium, social/forum/aggregator, propaganda front, pink-slime network — discard regardless of story importance).
4. **Authority cap (with Reserve Pool spillover)**: a Pass-B `auto-accept` carries its real tier (wire/flagship) and enters the **main story list**. A Pass-B `conditional-accept` carries its **real** tier (typically T2 for established national outlets; T3 for trade / niche / smaller-national outlets; **never** T1 unless the outlet is itself a recognised wire / flagship — in which case it is `auto-accept`).
   - **`conditional-accept` at T2 → main story list** (KEEP-eligible by the Verifier under the ordinary rubric).
   - **`conditional-accept` below T2 (T3-trade / T3-niche / smaller national outlets) → `## Reserve Pool`** with `Held: below-authority-cap`. **Do NOT discard.** The Verifier may promote these via Fallback 1.5 when a category is short (see `references/rubric.md` § Three-Step Coverage Fallback).
   - A Pass-B story may be the sole Lead of the current category only if Pass A surfaced nothing on that event; otherwise it corroborates.

Step 1.5 does not apply to Pass B (Pass B is already non-`site:`). Step 3.5 paywall logic still applies — a Pass-B hard-paywall hit becomes Lead under `Body-source: paywall-stub` when Step 3.5's title-anchored fallback search finds no free outlet covering the same event (the free outlet otherwise wins Lead and the paywalled original moves to `Corroborated by`). A hard-paywall hit is **not** Reserve-Pool-eligible: it is either a Lead (with Body-source flag) or Corroboration; the Reserve Pool exists for authority-cap holdouts, which is orthogonal.

### Step 2 — Walk the tier ladder for each active category, one at a time (Pass A)

For each category in `active_categories` order, run Pass A. Process one category at a time through Steps 2–5 before moving to the next category. After completing all categories, proceed to § Step 6 — Cross-Category Dedup & Routing.

1. **T4-official** — for the institutions in the Source Matrix's T4 institution-type table that are relevant to this category, run:
   ```
   site:{official-domain} {date_en}
   ```
   (e.g. for Korea Economy: `site:bok.or.kr April 28 2026`, `site:moef.go.kr April 28 2026`, `site:kostat.go.kr April 28 2026`.)
   If the institution's official domain is not known, fall back to a single bare-keyword query like `Korea central bank statement April 28 2026` — this is the **only** authorised bare-keyword exception.

   **For `country = China`**: the T4 institution set is the **China external-T4 table** below the main institution table — IMF, World Bank, WTO, OECD, BIS, IEA, US Treasury, USTR, US State Dept, US Commerce/BIS, White House, EU Commission, UK Gov, METI, MOFA Japan. Chinese government domains (`gov.cn`, `pbc.gov.cn`, `mof.gov.cn`, `stats.gov.cn`, `csrc.gov.cn`, etc.) are **never** queried as T4-official. When a Chinese government action is relevant, it surfaces through a Western wire reporting on it (e.g. `site:reuters.com PBoC May 11 2026`), not through its own domain.

2. **T1-wire** — for **every** applicable row (`Universal` + `Country: {country_en}`), run:
   ```
   site:{domain} {country_en} {term} {date_en}
   ```
   **One query per term, per domain — never `OR`-joined.** Korea Economy against `reuters.com` alone produces 16 queries (one per `econ` term):
   ```
   site:reuters.com South Korea economy April 28 2026
   site:reuters.com South Korea GDP April 28 2026
   site:reuters.com South Korea inflation April 28 2026
   site:reuters.com South Korea "interest rate" April 28 2026
   site:reuters.com South Korea "central bank" April 28 2026
   ... one query for each remaining econ term: "monetary policy", currency, bond, yield, "stock market", fiscal, budget, tax, trade, tariff, recession ...
   ```
   Repeat the full term list against every applicable T1-wire domain (`apnews.com`, `afp.com`, `bloomberg.com`, `dowjones.com`, `en.yna.co.kr`, …).
   **Apply Step 1.5 fallback** for any row where the `site:` query returns 0 results — common for `site:reuters.com`, `site:bloomberg.com`, `site:dowjones.com` against most countries.

3. **T1-flagship** — for every applicable row in `Global` + `Country: {country_en}` + `Region: {region}` (country-of-coverage table), run the same `site:`-anchored query template. **Apply Step 1.5 fallback** for any row where `site:` returns 0 — this is the most common failure mode against `site:ft.com`, `site:wsj.com`, `site:economist.com`, `site:nytimes.com`, `site:bbc.com`, `site:telegraph.co.uk`, `site:thetimes.co.uk`, `site:asia.nikkei.com`.

4. **T2** — only if the category has not yet reached `min_per_category` after T1-flagship. Run `site:`-anchored queries against every `Region: {region}` row. **Apply Step 1.5 fallback** as above.

5. **T3** — only if the category is still below `min_per_category` after T2. Run `site:`-anchored queries against the relevant `Sector` rows + `Country: {country_en}` rows + `Region: {region}` rows. Inside the Technology category, T3 sector rows (TechCrunch, MIT Technology Review, etc.) are first-class and may be entered as soon as T1-flagship is exhausted, without waiting for T2 — likewise the T3 Finance & Trade/Legal rows inside `ipo_ma` and `china_nexus` (see § Conditional Categories — Search Mechanics). **Apply Step 1.5 fallback** as above.

**Early-stop policy (per-term sweep).** Run the **full search-term set against every applicable domain at T4-official, T1-wire, and T1-flagship — regardless of `min_per_category`**. These three high-authority tiers are where breadth comes from; do **not** stop them early just because `min_per_category` is already met. The `min_per_category` rule governs **only** whether you descend into **T2** (run only if still below `min_per_category` after T1-flagship) and then **T3** (only if still below after T2). For `ipo_ma` / `china_nexus`, the primary-filing / external-T4 channel and the T3 Finance & Trade/Legal rows are always-first-class and are **not** subject to any early-stop (see § Conditional Categories). Collect every date-verified hit and dedupe by **event** at Step 4 — the same story surfacing under several terms is expected and merges to one keeper.

**Then run Pass B** per § Pass B — Free Discovery (always for `ipo_ma` / `china_nexus`; on-demand for the other five per the trigger rule).

The natural consequence: within each category, Pass-A stories are already ranked by source authority (T4-official before T1-wire, T1-wire before T1-flagship, etc.) because that is the order they were found in; Pass-B stories are appended after, tagged `discovery: B`.

### Step 3 — Date-verify every candidate URL immediately when collected

For **every** candidate URL collected at any tier in any category, call WebSearch `open_page` immediately and extract the publication date from the opened article text. Apply these rules without exception:

- Extract the publication date from the opened article (`<time>`, `<meta property="article:published_time">`, dateline, or structured data when exposed). Use `find_in_page` if it helps locate the date. Do NOT rely on search snippet dates — they are often stale or aggregator-injected.
- The extracted date must **exactly equal** `date` in either the outlet's local timezone or UTC. One match is sufficient.
- Neighbouring days do not qualify. `date ± 1` is a discard.
- If the article displays only a relative date (e.g. "3 hours ago") and no absolute date can be recovered from the HTML, **discard**.
- If the page is an index, topic hub, tag listing, or search results page rather than a single article, **discard**.
- If `open_page` returns an error or empty body, **discard**.

Keep only URLs that pass the date gate. Discard all others immediately — do not carry them forward, do not retry with relaxed rules, do not include them in the output.

### Step 3.5 — Paywall fallback (mandatory when paywall detected)

After the date gate passes, evaluate body retrievability. A **paywalled** candidate is Lead-eligible but a free alternative is **preferred** — the free body gives the Fact Manifest richer ground truth and the Editor can verify direct quotes against it. Only when no free alternative exists does the paywalled outlet itself become the Lead, with `Body-source: paywall-stub` flagging the Writer to compensate via mandatory background WebSearch.

**Paywall detection** (apply to every date-verified candidate):

A candidate is paywalled if **any** of these is true:
1. Its domain is in the **Hard paywall** list under Source Matrix § Paywall Status.
2. Its domain is in the **Metered** list AND `open_page` returned < 800 characters of article body.
3. The opened page contains any of: `subscription-required`, `register to continue`, `subscribe to read`, `paywall`, `<div class="paywall">`, `metered-content`, `<meta name="article:opinion" content="paid">`.

**When a candidate is paywalled:**

1. **Preserve it as a candidate Lead**: keep its title, URL, outlet name, byline, and verified publication date. Do NOT discard.
2. **Run a title-anchored fallback search** to find a free outlet covering the same event:
   ```
   site:reuters.com "<key noun phrase from title>" {date_en}
   site:apnews.com "<key noun phrase from title>" {date_en}
   site:afp.com "<key noun phrase from title>" {date_en}
   site:bbc.com "<key noun phrase from title>" {date_en}
   site:theguardian.com "<key noun phrase from title>" {date_en}
   ```
   Use 3-6 distinct word pairs from the paywalled title (e.g. `"BOJ" "split vote"`, `"rate hold" "Ueda"`). Run against **every Free-tier outlet** applicable to the country (Source Matrix § Paywall Status — Free table) until you find a match.
3. **Verify the fallback URL**: it must pass the same Step 3 date gate (publication date equals `date`).
4. **If a free fallback exists — promote it to `Lead`**: use its body for the factual excerpt; record the original paywalled outlet under `Corroborated by` with its URL. Set `Body-source: full`.
5. **If NO free fallback exists — the paywalled candidate IS the Lead**: it counts toward `min_per_category`. Set `Body-source: paywall-stub`. Record whatever stub body `open_page` returned as the factual excerpt (title + 1-2 paragraphs is normal). The Writer is contractually obligated to run ≥2 background WebSearch `search` actions and `open_page` every used source to fill out ≥200 words of factual body, and every search URL it uses for a body fact must appear in References (per `daily-news-writer.md` § paywall-stub handling). The Editor's quote-verification pass (Pass 3) will downgrade any direct quote not present in the stub body to indirect speech — quote retrievability is no longer a Lead-admission condition.

**Output convention**: the `Source:` field names the Lead's outlet — typically Free or T4-official, but **may be Hard-paywall** when `Body-source: paywall-stub`. Paywalled outlets that lost Lead status to a free alternative (case 4 above) appear in `Corroborated by` as before. The Writer emits one APA reference line for the Lead URL, one for each `Corroborated by` URL, and one for each background-search URL used in body — so every authority signal and every cited search result surfaces in the final `**References**` block.

### Step 4 — Classify, dedupe, and label

For each date-verified story (within the current category being processed):

1. **Tag discovery + proposed category**: every story carries `Discovery: A` (Pass A / matrix) or `Discovery: B` (Pass B / free) and `Proposed category: {current category}`. You may flag a story whose dominant frame looks like it belongs to a different category: set `Reroute hint: <other category>`. **Do not reroute during per-category passes** — hold `Reroute hint` stories as-is and resolve all cross-category dedup and routing in § Step 6 (after all passes). You only judge the `china_nexus` cross-border test enough to decide whether the item is in-scope for the current category at all.
2. **Record source tier**: T4-official / T1-wire / T1-flagship / T2 / T3. Pass-A tier per the matrix; Pass-B tier per the Source Legitimacy authority cap (`auto-accept` = real tier; `conditional-accept` = capped T2/T3).
3. **Assign Impact Tier label** (output-only, does not affect search): Policy / Market / Structural / Humanitarian — the Verifier consumes this downstream.
4. **Dedupe within each category as you go**: if two stories in the same category cover the same underlying event, keep the highest source tier and note the dropped outlet in the kept story's `Corroborated by`. Full cross-category dedup happens after all categories are processed, in § Step 6.

**Impact Tier label definitions** (assign one per story; output label only):
- **Policy** — central bank decisions, legislation passed or tabled, regulatory enforcement actions, election outcomes, treaty signings, diplomatic summits producing joint statements.
- **Market** — single-stock or sector moves ≥ 2%, M&A or major deals ≥ USD 1B, layoffs ≥ 1000, IPO pricing, sovereign rating changes, large bond auctions, commodity spikes with cross-sector knock-on.
- **Structural** — technology platform pivots, supply-chain relocations, landmark court rulings, large infrastructure approvals or cancellations, strategic industrial policy announcements.
- **Humanitarian** — armed-conflict developments, mass-casualty incidents, natural disasters with material regional impact, famine / displacement events.

### Step 5 — Output ordering within each category

Within each category, list stories in source-authority order: Pass-A T4-official first, then T1-wire, T1-flagship, T2, T3, then Pass-B stories (auto-accept before conditional-accept). Within the same tier, the more-corroborated story comes first; if still tied, the earlier publication time wins. Final cross-category ordering and assembly happen in § Step 6.

---

### Step 6 — Cross-Category Dedup & Routing (after all per-category passes complete)

Once every active category has been processed through Pass A + Pass B (Steps 2–5), consolidate the full pool.

**Cross-category deduplication**: When two or more stories (from any categories) cover the **same underlying event**:
- Keep one **Lead** — highest source authority. Tie-breakers: (a) higher tier (T4-official > T1-wire > T1-flagship > T2 > T3); (b) `Discovery: A` over `Discovery: B`; (c) `auto-accept` over `conditional-accept`; (d) category matching the dominant frame.
- Fold every other instance into the Lead's `Corroborated by` list — carry outlet, tier, paywall status, URL verbatim.
- "Same underlying event" = same actors + same action + same date. Related consecutive actions on one policy line collapse to the most substantive node.
- When ambiguous, you may issue **at most one** narrow `open_page` action per pair to disambiguate — never to hunt new stories or re-verify dates.

**Category routing**: Place each surviving story in exactly one category.
- Honour a `Reroute hint` when the dominant frame clearly matches it; otherwise keep `Proposed category`.
- Apply the **China-report `china_nexus`↔`ipo_ma` routing tie-break** per `references/rubric.md` § Conditional & Topical Categories: dominant frame = China's external economic/industrial strategy, key-industry positioning, or triggering foreign security/antitrust/investment-screening review → `china_nexus`; pure corporate-finance event → `ipo_ma`; purely domestic Chinese item or pure diplomacy → `econ`/`politics`.
- One story, exactly one final category. If a story matches no active category, route to best general category (`econ`/`politics`/`other`) — never drop (Verifier owns DROP decisions).

**Reserve Pool consolidation**: Pool all per-category held candidates. Apply same dedup discipline as for main stories — if a reserve-pool entry shares the underlying event with a main-pool story, fold it into the main story's `Corroborated by` and drop the reserve entry. If two reserve entries collide, keep the higher-real-tier one and fold the other into its `Corroborated by`. Group resulting reserve pool by `active_categories` order.

